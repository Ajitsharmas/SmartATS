# ---------------------------------------------------------------------------------------------------------------------------------------------
# Purpose: Production Orchestration
# ---------------------------------------------------------------------------------------------------------------------------------------------

services:
  # 1. Nginx — reverse proxy, rate limiting, SSL termination
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"   # HTTP — serves certbot ACME challenges and redirects to HTTPS
      - "443:443" # HTTPS — main application traffic
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certificates (populated by Certbot)
      - certbot_certs:/etc/letsencrypt
      # Webroot used by Certbot to serve ACME challenge files
      - certbot_webroot:/var/www/certbot
    depends_on:
      - web
    restart: always

  # 2. Certbot — obtains and auto-renews the Let's Encrypt SSL certificate
  # On first deployment, run setup-ssl.sh instead of starting this service directly.
  # After the initial certificate is issued, this service runs in the background
  # and attempts renewal every 12 hours (Certbot only renews if expiry is <30 days away).
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renewal loop: checks every 12 hours, no-op until cert is within 30 days of expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: always

  # 3. The API (FastAPI)
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  # 4. The Celery worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db
    restart: always

  # 5. The Postgres Database (with pgvector extension preinstalled)
  db:
    image: pgvector/pgvector:pg15
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always
    # DEMO ONLY: exposes Postgres on the host so DBeaver can connect at localhost:5432.
    # In a real production environment, remove this ports block entirely —
    # the database should only be reachable by other containers on the internal
    # Docker network, never directly from the outside world.
    ports:
      - "5432:5432"

  # 6. The Redis Broker
  redis:
    image: redis:7
    restart: always

  # 7. MinIO S3 Storage
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    # DEMO ONLY: exposes MinIO API (9000) and web console (9001) on the host.
    # The console lets you browse uploaded resumes visually for demo purposes.
    # In a real production environment, remove this ports block entirely —
    # MinIO should only be reachable by other containers on the internal
    # Docker network. On GCP, restrict both ports to your IP only via a
    # firewall rule — never open them to 0.0.0.0/0.
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_prod:/data
    env_file:
      - .env
    restart: always

volumes:
  postgres_data_prod:
  minio_data_prod:
  # Stores the Let's Encrypt certificates and account info
  certbot_certs:
  # Shared webroot directory used by Certbot for ACME HTTP-01 challenges
  certbot_webroot:
