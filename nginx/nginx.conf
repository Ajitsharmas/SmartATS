# -----------------------------------------------------------------------------------------------------------------------------------------------
# Purpose: Nginx Reverse Proxy — HTTP mode
# Used for initial deployment and Let's Encrypt certificate issuance.
# Once the SSL certificate has been obtained, switch to nginx-ssl.conf.
# See setup-ssl.sh for the automated switch process.
# -----------------------------------------------------------------------------------------------------------------------------------------------

events {}

http {

    # ---------------------------------------------------------------------------
    # Rate Limiting Zones
    # Defined at the http block so they are shared across all server blocks.
    # $binary_remote_addr stores the client IP in binary form (4 bytes for IPv4,
    # 16 for IPv6) — more memory-efficient than the string form $remote_addr.
    # Zone size 10m can track ~160,000 unique IP addresses simultaneously.
    # ---------------------------------------------------------------------------

    # General zone: applied to all traffic — 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

    # Auth zone: stricter limit for sensitive endpoints that send emails or
    # issue tokens — 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Connection zone: tracks the number of concurrent TCP connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Return 429 (Too Many Requests) instead of Nginx's default 503 so the
    # client receives the semantically correct HTTP status code
    limit_req_status 429;
    limit_conn_status 429;

    upstream fastapi_app {
        # 'web' matches the service name in docker-compose
        server web:8000;
    }

    server {
        listen 80;
        server_name smartats.xyz www.smartats.xyz;

        # ---------------------------------------------------------------------------
        # Let's Encrypt ACME challenge
        # Certbot writes challenge files here to prove domain ownership.
        # Must be served over plain HTTP — never redirect this path to HTTPS.
        # ---------------------------------------------------------------------------
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ---------------------------------------------------------------------------
        # Connection limit — applied to every location in this server block
        # Caps a single IP at 20 concurrent open TCP connections.
        # Defends against Slowloris-style attacks that hold connections open.
        # ---------------------------------------------------------------------------
        limit_conn conn_limit 20;

        # ---------------------------------------------------------------------------
        # General rate limit — applied to all requests not matched below
        # burst=50: allows a momentary spike of 50 queued requests above the rate
        # nodelay: excess requests beyond the burst are rejected immediately (429)
        #          rather than being queued and delayed
        # ---------------------------------------------------------------------------
        limit_req zone=general burst=50 nodelay;

        # ---------------------------------------------------------------------------
        # Auth / sensitive endpoints — stricter zone overrides the general limit
        # Covers: login, registration, all email-sending and token-consuming flows
        # burst=5: very small burst — these endpoints have no legitimate need for
        #          rapid repeated calls from a single IP
        # ---------------------------------------------------------------------------
        location ~ ^/(token|register|forgot-password|reset-password|resend-verification|verify-email) {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 10M;
        }

        # ---------------------------------------------------------------------------
        # All other traffic — general limit applies (set at server level above)
        # ---------------------------------------------------------------------------
        location / {
            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Allow large file uploads (resume PDFs)
            client_max_body_size 10M;
        }
    }
}
