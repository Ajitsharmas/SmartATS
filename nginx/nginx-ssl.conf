# -----------------------------------------------------------------------------------------------------------------------------------------------
# Purpose: Nginx Reverse Proxy — HTTPS mode
# Activated after the Let's Encrypt certificate has been issued by setup-ssl.sh.
# setup-ssl.sh copies this file over nginx.conf and reloads Nginx.
# -----------------------------------------------------------------------------------------------------------------------------------------------

events {}

http {

    # ---------------------------------------------------------------------------
    # Rate Limiting Zones (identical to nginx.conf)
    # ---------------------------------------------------------------------------

    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status 429;
    limit_conn_status 429;

    upstream fastapi_app {
        server web:8000;
    }

    # ---------------------------------------------------------------------------
    # HTTP server — only used to serve the Let's Encrypt ACME challenge and
    # redirect all other traffic to HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name smartats.xyz www.smartats.xyz;

        # Certbot renewal challenges must be served over plain HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS permanently
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS server — the main application server
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name smartats.xyz www.smartats.xyz;

        # ---------------------------------------------------------------------------
        # SSL Certificate (issued by Let's Encrypt via Certbot)
        # ---------------------------------------------------------------------------
        ssl_certificate     /etc/letsencrypt/live/smartats.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/smartats.xyz/privkey.pem;

        # Only allow modern, secure TLS versions
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suite — disables null encryption and MD5
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Cache SSL sessions to reduce handshake overhead on repeat connections
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---------------------------------------------------------------------------
        # Connection and rate limits (identical to nginx.conf)
        # ---------------------------------------------------------------------------
        limit_conn conn_limit 20;
        limit_req zone=general burst=50 nodelay;

        # ---------------------------------------------------------------------------
        # Auth / sensitive endpoints — stricter zone
        # ---------------------------------------------------------------------------
        location ~ ^/(token|register|forgot-password|reset-password|resend-verification|verify-email) {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Tells FastAPI the original request was HTTPS
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
        }

        # ---------------------------------------------------------------------------
        # All other traffic
        # ---------------------------------------------------------------------------
        location / {
            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 10M;
        }
    }
}
