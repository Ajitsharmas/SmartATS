#----------------------------------------------------------------------------------------------------------------------------
# Purpose: Define the infrastructure stack (DB, Redis, MinIO)
#----------------------------------------------------------------------------------------------------------------------------

name: resumeroast

services:
  # 1. The Postgres Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
      POSTGRES_DB: resume_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  # 2. The Redis Message Broker
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
  
  # 3. The Object Storage MinIO (S3-Compatible Storage)
  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" #API Port
      - "9001:9001" # Console Port
    volumes:
      - minio_data:/data
  
volumes:
  postgres_data:
  minio_data:
