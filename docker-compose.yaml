#----------------------------------------------------------------------------------------------------------------------------
# Purpose: Define the infrastructure stack (DB, Redis, MinIO, Worker)
# All environment variables are read from .env — no credentials are hardcoded here.
#----------------------------------------------------------------------------------------------------------------------------

name: smartats

services:
  # 1. The Postgres Database
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The Redis Message Broker
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # 3. The Object Storage MinIO (S3-Compatible Storage)
  # Note: MinIO's Docker image expects MINIO_ROOT_USER / MINIO_ROOT_PASSWORD.
  # We map these from MINIO_ACCESS_KEY / MINIO_SECRET_KEY in .env using
  # variable substitution so the app config and MinIO config stay in sync.
  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console Port
    volumes:
      - minio_data:/data

  # 4. The Background Worker (Celery)
  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      # Override localhost URLs from .env with Docker service names.
      # The FastAPI app runs locally on the host and reads .env directly
      # (localhost is correct there). The worker runs inside Docker and
      # must use service names to reach other containers.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: http://minio:9000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RATE_LIMITER_STORAGE_URL: redis://redis:6379/0
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
  minio_data:
