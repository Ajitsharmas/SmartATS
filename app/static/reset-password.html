<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SmartATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md fade-in border border-slate-100">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-1">SmartATS</h1>
            <p class="text-slate-500 text-sm">Set a new password for your account</p>
        </div>

        <!-- Form -->
        <div id="stateForm">
            <form id="resetForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">New Password</label>
                    <input type="password" id="newPassword" required minlength="4" placeholder="••••••••"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    <p class="text-xs text-slate-400 mt-1 text-right">Minimum 4 characters</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>

                <!-- Inline error -->
                <div id="formError"
                    class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-4 py-2">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200 flex justify-center items-center gap-2">
                    Set New Password
                </button>
                <button type="button" onclick="window.location.href='/login'"
                    class="w-full border border-slate-300 text-slate-600 hover:bg-slate-50 font-medium py-3 rounded-lg transition duration-200">
                    Cancel
                </button>
            </form>
        </div>

        <!-- Success -->
        <div id="stateSuccess" class="hidden text-center">
            <div class="flex justify-center mb-5">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-green-600" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </div>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Password Updated</h2>
            <p class="text-slate-500 text-sm mb-6">Your password has been changed. You can now sign in.</p>
            <a href="/login"
                class="block w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                Go to Login
            </a>
        </div>

        <!-- Invalid / expired link -->
        <div id="stateInvalid" class="hidden text-center">
            <div class="flex justify-center mb-5">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-red-600" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Link Invalid or Expired</h2>
            <p id="invalidMessage" class="text-slate-500 text-sm mb-6">
                Please request a new password reset link from the login page.
            </p>
            <a href="/login"
                class="block w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                Back to Login
            </a>
        </div>

    </div>

    <script>
        function showState(stateId, message) {
            ['stateForm', 'stateSuccess', 'stateInvalid'].forEach(id =>
                document.getElementById(id).classList.add('hidden')
            );
            document.getElementById(stateId).classList.remove('hidden');
            if (message) document.getElementById('invalidMessage').textContent = message;
        }

        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            showState('stateInvalid', 'No reset token found. Please use the link from your email.');
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword     = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorEl         = document.getElementById('formError');
            const btn             = document.getElementById('submitBtn');

            errorEl.classList.add('hidden');

            if (newPassword !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match. Please try again.';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<div class="loader"></div> Updating…';
            btn.disabled  = true;

            try {
                const res  = await fetch('/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token,
                        new_password: newPassword,
                        confirm_password: confirmPassword,
                    }),
                });
                const data = await res.json();

                if (res.ok) {
                    showState('stateSuccess');
                } else if (res.status === 400) {
                    showState('stateInvalid', data.detail || 'This link is invalid or has expired.');
                } else {
                    errorEl.textContent = data.detail || 'Something went wrong. Please try again.';
                    errorEl.classList.remove('hidden');
                    btn.innerHTML = 'Set New Password';
                    btn.disabled  = false;
                }
            } catch {
                errorEl.textContent = 'Could not connect to the server. Please check your connection.';
                errorEl.classList.remove('hidden');
                btn.innerHTML = 'Set New Password';
                btn.disabled  = false;
            }
        });
    </script>
</body>
</html>
