<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartATS - Find Your Dream Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-white text-slate-800">

    <header class="bg-gradient-to-r from-indigo-600 to-purple-700 text-white shadow-lg">
        <nav class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <span class="font-bold text-xl tracking-tight">SmartATS</span>
            <a href="/login"
                class="text-sm font-medium bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition">Recruiter
                Login</a>
        </nav>
        <div class="max-w-7xl mx-auto px-6 py-20 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-6">
                Upload Resume. <span class="text-indigo-200">Get Hired.</span>
            </h1>
            <p class="text-lg text-indigo-100 max-w-2xl mx-auto mb-8">
                Browse open roles, view full job details, and apply in seconds.
            </p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">

        <h2 class="text-2xl font-bold flex items-center mb-6">
            <i data-lucide="briefcase" class="w-6 h-6 mr-2 text-indigo-600"></i>
            Open Positions
        </h2>

        <div id="publicJobs" class="space-y-4">
            <div class="p-8 text-center text-slate-400 bg-slate-50 rounded-lg">Loading jobs…</div>
        </div>

    </main>

    <footer class="border-t border-slate-100 mt-12 py-8 text-center text-slate-400 text-sm">
    </footer>

    <script src="/static/js/api.js"></script>
    <script>
        lucide.createIcons();

        // 1. Fetch and render the public jobs list. Each card is a link to the
        //    per-job details page (/job/{id}) where the candidate can read the
        //    full posting and submit an application.
        async function loadJobs() {
            try {
                const jobs = await Api.getJobs();
                const container = document.getElementById('publicJobs');
                if (jobs.length === 0) {
                    container.innerHTML = `<div class="p-8 text-center border rounded-lg bg-slate-50">No open positions.</div>`;
                    return;
                }
                container.innerHTML = jobs.map(job => {
                    const skills = (job.skills || '').split(',').map(s => s.trim()).filter(Boolean);
                    const skillChips = skills.slice(0, 5).map(s =>
                        `<span class="text-[11px] font-medium px-2 py-0.5 bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-full">${escapeHtml(s)}</span>`
                    ).join('');
                    const moreSkills = skills.length > 5
                        ? `<span class="text-[11px] text-slate-400 px-1">+${skills.length - 5} more</span>`
                        : '';
                    const descPreview = (job.description || '').slice(0, 180).trim();
                    const descTail = (job.description || '').length > 180 ? '…' : '';
                    const meta = [
                        job.location ? escapeHtml(job.location) : null,
                        job.salary_range ? escapeHtml(job.salary_range) : null,
                    ].filter(Boolean).join(' &bull; ');

                    return `
                        <a href="/job/${job.id}" class="block bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-300 transition">
                            <div class="flex justify-between items-start gap-3 mb-1">
                                <h3 class="font-bold text-lg text-slate-800 leading-snug">${escapeHtml(job.title)}</h3>
                                <span class="text-xs text-slate-400 whitespace-nowrap pt-1">Job ID: ${job.id}</span>
                            </div>
                            <p class="text-slate-500 text-xs mb-3">${meta || '&nbsp;'}</p>
                            ${skills.length ? `<div class="flex flex-wrap gap-1.5 mb-3">${skillChips}${moreSkills}</div>` : ''}
                            ${descPreview ? `<p class="text-sm text-slate-600 leading-relaxed line-clamp-3">${escapeHtml(descPreview)}${descTail}</p>` : ''}
                            <div class="mt-3 text-xs font-medium text-indigo-600">
                                View details & apply →
                            </div>
                        </a>
                    `;
                }).join('');
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        loadJobs();
    </script>
</body>

</html>
