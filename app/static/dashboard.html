<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recruiter Dashboard - SmartATS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen" data-route="jobs">

    <nav class="bg-white border-b border-slate-200 shadow-sm h-14">
        <div class="max-w-7xl mx-auto px-8 h-full flex items-center justify-between">
            <a href="/dashboard" class="font-bold text-2xl text-indigo-600 tracking-tight">SmartATS</a>
            <div class="flex items-center gap-6">
                <a href="/dashboard" data-route="jobs"     class="nav-link text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Jobs</a>
                <a href="/search"    data-route="search"   class="nav-link text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Search</a>
                <a href="/assistant" data-route="assistant" class="nav-link text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Assistant</a>
                <a href="/settings"  data-route="settings" class="nav-link text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Settings</a>
            </div>
            <div class="flex items-center gap-4">
                <button id="aiStatusBtn"
                    class="flex items-center gap-1.5 text-sm font-medium px-3 py-1.5 rounded-lg border border-slate-200 text-slate-600 hover:border-indigo-400 hover:text-indigo-600 transition">
                    <span id="aiStatusDot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                    <span id="aiStatusLabel">Check AI</span>
                </button>
                <button onclick="localStorage.removeItem('access_token'); window.location.href='/login'" class="text-sm text-slate-500 hover:text-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-8">

        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Your Jobs</h1>
                <p class="text-sm text-slate-500 mt-1">Click any job to view its ranked applicants.</p>
            </div>
            <div class="flex gap-2 items-center">
                <button id="rematchAllBtn" class="text-xs font-medium text-slate-500 hover:text-indigo-600 border border-slate-200 hover:border-indigo-300 rounded-lg px-3 py-2 transition inline-flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v6h-6"/></svg>
                    Re-check matches for all applicants
                </button>
                <button id="newJobBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 font-medium text-sm inline-flex items-center gap-1.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New job
                </button>
            </div>
        </div>

        <div id="jobsList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="col-span-full text-slate-400 text-center py-12 text-sm">Loading…</div>
        </div>

    </main>

    <!-- Post / edit job modal -->
    <div id="jobModal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-lg w-96 shadow-2xl">
            <h3 id="jobModalTitle" class="font-bold text-lg mb-4">Post New Job</h3>
            <form id="jobForm" class="space-y-3">
                <input name="title" placeholder="Job Title (min 5 chars)" class="w-full border p-2 rounded" required minlength="5">
                <input name="description" placeholder="Description (min 10 chars)" class="w-full border p-2 rounded" required minlength="10">
                <input name="skills" placeholder="Skills (comma sep)" class="w-full border p-2 rounded" required>
                <input name="location" placeholder="Location" class="w-full border p-2 rounded" required>
                <input name="salary_range" placeholder="Salary ($100k-$120k)" class="w-full border p-2 rounded">
                <button type="submit" id="jobModalSubmitBtn" class="w-full bg-indigo-600 text-white py-2 rounded font-bold">Post</button>
            </form>
            <button id="jobModalCancelBtn" class="w-full mt-2 text-slate-400 text-sm">Cancel</button>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/ai-status.js"></script>
    <script src="/static/js/jobs-page.js"></script>
</body>
</html>
